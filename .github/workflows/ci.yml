name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Go ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -o ./bin/gh-attach ./cmd/gh-attach

      - name: Scan called code for known vulnerabilities
        if: runner.os == 'Linux'
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

      - name: Verify third-party notices can be generated
        if: runner.os == 'Linux'
        run: ./script/generate-third-party-notices.sh "$RUNNER_TEMP/THIRD_PARTY_NOTICES.txt"

  formatting:
    name: Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: go.mod

      - name: Check gofmt
        shell: bash
        run: |
          unformatted="$(git ls-files -z '*.go' | xargs -0 gofmt -l)"
          if [[ -n "$unformatted" ]]; then
            printf 'These files need gofmt:\n%s\n' "$unformatted"
            exit 1
          fi
