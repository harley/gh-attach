name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    name: Publish precompiled extension
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build, attest, and publish release assets
        uses: cli/gh-extension-precompile@76961aa3bd1123d0a6fd42d0a41aca0696937c39 # v2.2.0
        with:
          go_version_file: go.mod
          go_build_options: ./cmd/gh-attach
          generate_attestations: true

      - name: Generate third-party license notices
        run: ./script/generate-third-party-notices.sh THIRD_PARTY_NOTICES.txt

      - name: Add third-party notices to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" THIRD_PARTY_NOTICES.txt --clobber
